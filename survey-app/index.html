<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>월급쟁이부자들 인적성 검사</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root { 
            --accent-red: #BD1E2D; 
            --soft-red: #FFF1F2;
            --text-black: #1F2937; 
            --text-gray: #9CA3AF;
        }
        * { font-family: 'Pretendard', sans-serif !important; }
        body { background: #FFFFFF; color: var(--text-black); height: 100vh; display: flex; flex-direction: column; margin: 0; overflow: hidden; }
        
        .fade-in { animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .header-logo { position: fixed; top: 35px; left: 45px; z-index: 100; display: none; }
        .header-logo img { height: 35px; object-fit: contain; }

        .glass-panel { 
            background: #FFFFFF; 
            border-radius: 2.5rem; 
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.05);
            max-width: 680px; width: 94%; margin: auto;
        }

        .info-box {
            background: var(--soft-red);
            padding: 1.5rem 1.25rem;
            border-radius: 1.5rem;
            border: 1px solid #FFE4E6;
            text-align: center;
        }

        .balanced-text {
            display: block;
            margin: 0 auto;
            line-height: 1.8;
            word-break: keep-all;
            text-wrap: balance;
            text-align: center;
        }

        .text-normal { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.01em; }

        .scale-container { display: flex; align-items: center; justify-content: center; gap: 0.8rem; }
        .scale-item {
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease;
            border: 2px solid #F3F4F6; font-weight: 700; background: #fff; color: #D1D5DB;
        }
        .dot-1, .dot-7 { width: 58px; height: 58px; font-size: 1.15rem; }
        .dot-2, .dot-6 { width: 50px; height: 50px; font-size: 1.05rem; }
        .dot-3, .dot-5 { width: 42px; height: 42px; font-size: 0.95rem; }
        .dot-4 { width: 34px; height: 34px; font-size: 0.85rem; }

        .scale-item:hover { border-color: var(--text-black); color: var(--text-black); transform: translateY(-2px); }
        .scale-item.selected { background: var(--text-black); color: #fff !important; border-color: var(--text-black); }

        .progress-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: #F9FAFB; z-index: 1000; }
        #progress-bar { height: 100%; background: var(--accent-red); transition: width 0.3s ease; width: 0%; }

        #q-text-container { min-height: 110px; display: flex; align-items: center; justify-content: center; margin-bottom: 3rem; }
    </style>
</head>
<body>

    <div class="progress-wrapper">
        <div id="progress-bar"></div>
    </div>

    <div id="header-logo" class="header-logo">
        <img src="logo.png" alt="월급쟁이부자들">
    </div>

    <main class="flex-grow flex items-center justify-center">
        <div id="survey-app" class="glass-panel p-6 md:p-10 fade-in">
            
            <div id="step-intro" class="space-y-6 text-center">
                <div class="flex flex-col items-center">
                    <img src="logo.png" alt="월급쟁이부자들" class="h-12 md:h-14 mb-2">
                    <h1 class="text-2xl font-black text-gray-400 tracking-tight mt-6">인적성 검사</h1>
                </div>
                
                <div class="info-box shadow-sm">
                    <p class="text-gray-800 font-bold text-xl mb-4">안녕하세요, 월급쟁이부자들입니다.</p>
                    <p class="text-gray-600 font-medium balanced-text" style="max-width: 580px;">
                        바쁘신 일정에도 귀한 시간을 내어 참석해주셔서 진심으로 감사드립니다.<br>
                        이 검사는 인터뷰의 당락과 무관하니, 각 문항을 읽고 본인과 가장 가까운 정도를 빠르게 선택해주시면 감사하겠습니다 :)<br>
                        해당 검사는 총 60문항으로 구성되어 있습니다.
                    </p>
                </div>

                <div class="max-w-xs mx-auto pt-4">
                    <input type="text" id="user-name" placeholder="성함을 입력해주세요" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 outline-none text-center font-bold focus:border-black transition-all mb-4">
                    <button onclick="startSurvey()" class="w-full bg-[#BD1E2D] py-5 rounded-xl font-black text-white text-xl shadow-lg active:scale-95 transition-all hover:bg-[#a01a27]">검사 시작하기</button>
                </div>
            </div>

            <div id="step-question" class="hidden space-y-10">
                <div class="flex justify-end opacity-30">
                    <span id="q-number" class="text-xs font-black text-gray-800">01 / 60</span>
                </div>

                <div id="q-text-container">
                    <h2 id="q-text" class="balanced-text text-gray-900">질문 로딩 중...</h2>
                </div>

                <div class="flex items-center justify-center gap-4 md:gap-8">
                    <div class="text-right font-bold text-gray-300 text-sm w-16">매우<br>그렇다</div>
                    <div class="scale-container">
                        <div class="scale-item dot-1" onclick="handleSelect(1)">1</div>
                        <div class="scale-item dot-2" onclick="handleSelect(2)">2</div>
                        <div class="scale-item dot-3" onclick="handleSelect(3)">3</div>
                        <div class="scale-item dot-4" onclick="handleSelect(4)">4</div>
                        <div class="scale-item dot-5" onclick="handleSelect(5)">5</div>
                        <div class="scale-item dot-6" onclick="handleSelect(6)">6</div>
                        <div class="scale-item dot-7" onclick="handleSelect(7)">7</div>
                    </div>
                    <div class="side-label text-left font-bold text-gray-300 text-sm w-16">매우<br>아니다</div>
                </div>

                <div class="flex flex-col items-center gap-4">
                    <div id="last-q-notice" class="hidden"></div>
                    <div class="w-full flex justify-between items-center">
                        <button id="back-btn" onclick="goBack()" class="text-black text-sm font-bold hover:opacity-70 transition-colors">← 이전 문항</button>
                        <button id="submit-btn" onclick="submitSurvey()" class="hidden bg-[#FCA5A5] px-10 py-4 rounded-xl font-bold text-white shadow-md active:scale-95 transition-all hover:bg-[#F87171]">제출하기</button>
                    </div>
                </div>
            </div>

            <div id="step-finish" class="hidden text-center space-y-8 py-10 fade-in">
                <h2 class="text-4xl font-black text-gray-800 tracking-tight">검사가 모두 완료되었습니다 😊</h2>
                <div class="space-y-2 text-gray-400 font-bold text-lg">
                    <p>고생많으셨습니다.</p>
                    <p class="balanced-text" style="max-width: 500px;">조금만 더 대기 해주시면 인재영입담당자가 내려와<br>면접실로 안내드릴 예정입니다.</p>
                </div>
                <div class="pt-6">
                    <button onclick="resetSurvey()" class="px-8 py-3 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl font-bold transition-all">처음으로 돌아가기</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const questions = ["1. 주기적으로 새로운 친구를 사귄다.", "2. 단순하고 직관적인 아이디어보다는 복잡하고 참신한 아이디어에 흥미를 느낀다.", "3. 일반적으로 사실에 기반한 주장보다 감정적으로 공감 가는 내용이 더 설득력 있다고 느낀다.", "4. 생활 공간과 업무 공간이 깨끗하고 정돈되어 있다.", "5. 압박감이 심한 환경에서도 평정심을 유지하는 편이다.", "6. 모르는 사람과 관계를 형성하거나 남에게 나를 알리는 것은 매우 부담스럽다.", "7. 효과적으로 작업을 계획하고 우선순위를 정하며, 마감 기한보다 훨씬 일찍 작업을 완료할 때가 많다.", "8. 숫자나 데이터보다는 사람들의 이야기와 감정이 마음에 더 와닿는다.", "9. 일정이나 목록 등 일을 체계화할 수 있는 도구를 사용하는 것을 좋아한다.", "10. 작은 실수로도 나의 능력이나 지식을 의심할 때가 있다.", "11. 관심이 가는 사람에게 다가가서 대화를 시작하는 것이 불편하지 않다.", "12. 창작물의 다양한 해석에 대해 토론하는 일에는 큰 관심이 없다.", "13. 행동 계획을 결정할 때 사람들의 감정보다는 사실을 우선한다.", "14. 계획 없이 하루를 보낼 때가 많다.", "15. 다른 사람에게 자신이 어떤 사람으로 보일지 걱정하는 경우는 드물다.", "16. 팀 기반 활동에 참여하는 것을 좋아한다.", "17. 새롭고 검증되지 않은 접근 방식을 실험하는 것을 즐긴다.", "18. 완전한 솔직함보다 세심함을 우선시한다.", "19. 탐구할 새로운 경험, 지식 분야를 적극적으로 찾는다.", "20. 일이 잘못될까봐 자주 걱정하는 편이다.", "21. 단체 활동보다 혼자서 하는 취미나 활동을 더 좋아한다.", "22. 소설 쓰는 일을 직업으로 삼은 나의 모습을 상상할 수 없다.", "23. 감정적 측면을 다소 무시하더라도 의사 결정의 효율성을 선호한다.", "24. 휴식을 취하기 전에 집안일을 먼저 하는 것을 더 좋아한다.", "25. 의견 차이가 있으면 다른 사람의 감정을 보호하기보다 자신의 주장을 입증하는 것을 우선시한다.", "26. 일반적으로 사교 모임에서는 다른 사람들이 먼저 다가오기를 기다린다.", "27. 감정이 매우 빠르게 변할 때가 많다.", "28. 감정적인 논쟁에 쉽게 동요하지 않는다.", "29. 해야 할 일을 마지막까지 미룰 때가 많다.", "30. 윤리적 딜레마에 대해 토론하는 것을 좋아한다.", "31. 일반적으로 혼자 있는 것보다는 다른 사람과 어울리는 것을 선호한다.", "32. 논의가 지나치게 이론적이 되면 지루해지거나 흥미를 잃는다.", "33. 사실과 감정이 충돌할 때 감정에 따라 행동한다.", "34. 업무나 학업 일정을 일관성 있게 유지하는 것이 어렵다.", "35. 이미 내린 결정에 대해서는 다시 생각하는 경우는 드물다.", "36. 친구들은 나를 활기차고 외향적이라고 묘사한다.", "37. 글쓰기와 같은 다양한 형태의 창의적 표현에 끌립니다.", "38. 보통 감정적인 인상보다는 객관적인 사실에 기반하여 선택한다.", "39. 매일 할 일을 계획하는 것이 좋다.", "40. 불안함을 느끼는 경우는 드물다.", "41. 전화 걸기를 꺼린다.", "42. 생소한 아이디어, 관점을 탐구하는 일을 좋아한다.", "43. 방금 만난 사람과 쉽게 친해질 수 있다.", "44. 계획에 차질이 생기면 최대한 빨리 원래 계획대로 진행하기를 최우선으로 한다.", "45. 오래전의 실수를 후회하곤 한다.", "46. 미래에 세상이 어떤 모습일지에 대한 의견을 주고받는 일에는 크게 관심이 없다.", "47. 감정을 조절하기보다는 감정에 휘둘린다.", "48. 결정을 내릴 때 가장 논리적이거나 효율적인 방법보다 영향을 받는 사람들이 어떻게 생각할지에 더 집중한다.", "49. 계획에 따라 일관성 있게 업무를 진행하기보다는 즉흥적인 에너지로 업무를 몰아서 처리하는 편이다.", "50. 상대방이 자신을 높게 평가하면 나중에 상대방이 실망하게 될까 걱정하곤 한다.", "51. 대부분의 시간을 혼자서 일할 수 있는 직업을 원한다.", "52. 추상적인 철학적 질문에 대해 깊게 생각하는 일은 시간 낭비라고 생각한다.", "53. 조용하고 사적인 장소보다는 사람들로 붐비고 떠들썩한 장소에 마음이 더 끌린다.", "54. 어떤 결정이 옳다고 생각하면 종종 추가 증거 없이도 그 결정에 따라 행동한다.", "55. 격한 감정에 휩싸일 때가 많다.", "56. 단계를 건너뛰는 일 없이 절차대로 일을 완수한다.", "57. 구체적인 단계를 따르기보다는 창의적인 해결책을 생각해 내야 하는 작업을 선호한다.", "58. 선택할 때 논리적으로 추론하기보다는 감정적인 직관에 더 의지하는 경향이 있다.", "59. 마감 기한을 지키기가 힘들다.", "60. 일이 원하는 대로 진행될 것이라는 자신감이 있다."];

        let currentIdx = 0; let results = [];

        function startSurvey() {
            if(!document.getElementById('user-name').value) return alert("성함을 입력해주세요!");
            document.getElementById('step-intro').classList.add('hidden');
            document.getElementById('step-question').classList.remove('hidden');
            document.getElementById('header-logo').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const qArea = document.getElementById('step-question');
            const qTextElem = document.getElementById('q-text');
            qArea.classList.remove('fade-in'); void qArea.offsetWidth; qArea.classList.add('fade-in');
            const fullText = questions[currentIdx];
            qTextElem.innerText = fullText;
            qTextElem.className = 'balanced-text text-normal text-gray-900';
            document.getElementById('q-number').innerText = `${(currentIdx + 1).toString().padStart(2, '0')} / 60`;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
            document.getElementById('back-btn').style.visibility = currentIdx > 0 ? 'visible' : 'hidden';
            document.getElementById('last-q-notice').classList.toggle('hidden', currentIdx < 59);
            
            // 마지막 문항 처리 (제출 버튼 표시)
            const submitBtn = document.getElementById('submit-btn');
            if (currentIdx === 59 && results[currentIdx]) {
                submitBtn.classList.remove('hidden');
            } else {
                submitBtn.classList.add('hidden');
            }

            document.querySelectorAll('.scale-item').forEach(d => d.classList.remove('selected'));
            if(results[currentIdx]) document.querySelectorAll('.scale-item')[results[currentIdx]-1].classList.add('selected');
        }

        function handleSelect(val) {
            if(!val) return;
            results[currentIdx] = val;
            document.querySelectorAll('.scale-item').forEach(d => d.classList.remove('selected'));
            document.querySelectorAll('.scale-item')[val-1].classList.add('selected');
            
            if (currentIdx === 59) {
                // 마지막 문항이면 즉시 제출 버튼 표시
                document.getElementById('submit-btn').classList.remove('hidden');
            } else {
                setTimeout(() => { 
                    if (currentIdx < questions.length - 1) { 
                        currentIdx++; 
                        showQuestion(); 
                    } 
                }, 100);
            }
        }

        function submitSurvey() {
            if (!results[59]) return alert("마지막 문항도 체크해주세요!");
            
            const isConfirmed = confirm("정말로 제출하시겠습니까? 제출 후에는 수정이 불가능합니다.");
            if (isConfirmed) {
                finishSurvey();
            }
        }

        function goBack() { if(currentIdx > 0) { currentIdx--; showQuestion(); } }

        function resetSurvey() {
            currentIdx = 0;
            results = [];
            document.getElementById('user-name').value = '';
            document.getElementById('step-finish').classList.add('hidden');
            document.getElementById('step-intro').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('header-logo').style.display = 'none';
        }

        function finishSurvey() {
            document.getElementById('step-question').classList.add('hidden');
            document.getElementById('header-logo').style.display = 'none';
            document.getElementById('step-finish').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '100%';

            // 구글 앱스 스크립트 웹 앱 URL을 여기에 붙여넣으세요!
            const scriptUrl = 'https://script.google.com/macros/s/AKfycbyggaMS3YF9KyX5WDq46SlmPayqMIv6rZq61IxkTkRex004Ix5icKtdTs-P-o32iByRVQ/exec'; 
            
            const payload = {
                name: document.getElementById('user-name').value,
                results: results
            };

            if (scriptUrl === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
                console.warn('Google Apps Script URL is not set. Data will not be submitted.');
                return;
            }

            fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                console.log('✅ 데이터가 성공적으로 제출되었습니다.');
            }).catch((error) => {
                console.error('❌ 제출 오류:', error);
            });
        }
    </script>
</body>
</html>
